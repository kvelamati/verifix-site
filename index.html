<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifix IO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh;
        }

        .site-header {
            padding: 20px 30px;
            background-color: #1a1a1a;
        }

        .site-header h1 {
            font-size: 1.75rem;
            font-weight: 500;
            font-style: normal;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .hero {
            position: relative;
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(90, 75, 60, 0.35),
                rgba(70, 60, 50, 0.45)
            );
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-overlay h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            line-height: 1.15;
            color: #f0ece4;
            max-width: 800px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        /* Waitlist section */
        .waitlist {
            padding: 4rem 2rem 5rem;
            text-align: center;
            background-color: #141414;
        }

        .waitlist h3 {
            font-size: 1.6rem;
            font-weight: 400;
            color: #e0dcd6;
            margin-bottom: 0.75rem;
        }

        .waitlist p {
            font-size: 1rem;
            color: #6b6560;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .waitlist form {
            display: flex;
            gap: 0;
            max-width: 440px;
            margin: 0 auto;
        }

        .waitlist input[type="email"] {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 1px solid #333;
            border-right: none;
            background: transparent;
            color: #fff;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .waitlist input[type="email"]::placeholder {
            color: #555;
        }

        .waitlist input[type="email"]:focus {
            border-color: #7a6a58;
        }

        .waitlist button {
            padding: 0.85rem 1.8rem;
            background: #f0ece4;
            color: #1a1a1a;
            border: 1px solid #f0ece4;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        .waitlist button:hover {
            background: transparent;
            color: #f0ece4;
        }

        /* Footer */
        footer {
            padding: 2.5rem 2rem;
            text-align: center;
            background-color: #111;
            border-top: 1px solid #222;
        }

        footer p {
            font-size: 0.85rem;
            color: #4a4540;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1>Verifix IO</h1>
    </header>
    <section class="hero">
        <img src="hero.jpg" alt="Industrial robotic arm for manufacturing">
        <div class="hero-overlay">
            <h2>Advanced Solutions for Manufacturing</h2>
        </div>
    </section>

    <section class="waitlist">
        <h3>Something new is coming.</h3>
        <p>Be the first to know when we launch.</p>
        <form onsubmit="event.preventDefault(); this.innerHTML='<p style=\'color:#a0978e;font-size:1.1rem;\'>Thank you. We\'ll be in touch.</p>';">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Verifix IO &mdash; All rights reserved.</p>
    </footer>
</body>
</html>
