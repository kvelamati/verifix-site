<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifix IO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh;
        }

        .site-header {
            padding: 20px 30px;
            background-color: #1a1a1a;
        }

        .site-header h1 {
            font-size: 1.25rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.5px;
            color: #e0e0e0;
        }

        .hero {
            position: relative;
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(90, 75, 60, 0.35),
                rgba(70, 60, 50, 0.45)
            );
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-overlay h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            line-height: 1.15;
            color: #f0ece4;
            max-width: 800px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1>Verifix IO</h1>
    </header>
    <section class="hero">
        <img src="hero.jpg" alt="Industrial robotic arm for manufacturing">
        <div class="hero-overlay">
            <h2>Advanced Solutions for Manufacturing</h2>
        </div>
    </section>
</body>
</html>
